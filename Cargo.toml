[workspace]
resolver = "2"
members = ["crates/jfmt-core", "crates/jfmt-io", "crates/jfmt-cli"]

[workspace.package]
version = "0.0.1"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
repository = "https://github.com/lizhongwei/XJsonView"
authors = ["lizhongwei <lzw1003362793@gmail.com>"]

[workspace.dependencies]
# Core streaming parser
struson = "0.6"
# Error handling
thiserror = "1"
anyhow = "1"
# I/O
flate2 = "1"
zstd = "0.13"
# CLI
clap = { version = "4", features = ["derive"] }
# Test utilities
assert_cmd = "2"
predicates = "3"
tempfile = "3"
proptest = "1"
serde_json = "1"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
